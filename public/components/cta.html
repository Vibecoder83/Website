<section class="cta-section" id="contact">
  <h2>Is jouw website aan vernieuwing toe?</h2>
  <p>Stuur ons jouw websiteadres en we geven je binnen 24 uur eerlijk en gratis advies.</p>
  <div class="contact-form">
    <label class="form-label">Jouw naam</label>
    <input type="text" placeholder="Jan de Vries" />
    <label class="form-label">E-mailadres</label>
    <input type="email" placeholder="jan@jouwbedrijf.nl" />
    <label class="form-label">Websiteadres (optioneel)</label>
    <input type="text" placeholder="www.jouwwebsite.nl" />
    <label class="form-label">Waar kan ik je mee helpen?</label>
    <textarea placeholder="Vertel kort wat je nu hebt en wat je zou willen..."></textarea>
    <button type="button">Verstuur aanvraag</button>
  </div>
</section>
